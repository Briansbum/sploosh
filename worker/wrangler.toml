name = "sploosh"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 database
[[d1_databases]]
binding = "DB"
database_name = "sploosh"
database_id = "6580ea7a-a3c2-4193-aa08-34aa9dcab4ef"

# Scheduled reconciler + allowlist sweeper
[triggers]
crons = ["*/5 * * * *"]

# Secrets (add with: wrangler secret put <NAME>)
# AWS_ACCESS_KEY_ID
# AWS_SECRET_ACCESS_KEY
# AWS_REGION          (default: eu-west-2)
# DISCORD_PUBLIC_KEY
# DISCORD_APP_ID
# DISCORD_BOT_TOKEN
# ADMIN_SECRET        (for /admin/* endpoints called by CI)
# IDLE_WEBHOOK_SECRET (HMAC for idle-shutdown calls from instances)
# CF_API_TOKEN        (Cloudflare API token, Zone.DNS:Edit scoped to CF_ZONE_ID)
# CF_ZONE_ID          (Cloudflare zone ID for xoxominelifexoxo.uk)

[vars]
AWS_REGION = "eu-west-2"
CF_DOMAIN = "xoxominelifexoxo.uk"
