name: Build modpacks

on:
  push:
    branches: [main]
    paths:
      - "modpacks/**"
      - "flake.nix"
      - "flake.lock"
  workflow_dispatch:

permissions:
  contents: write      # create releases
  pages: write         # deploy Pages
  id-token: write      # OIDC for Pages

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      modpacks: ${{ steps.list.outputs.modpacks }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          packs=$(ls modpacks/ | grep -v '^_' | grep -v '^default.nix' | jq -Rnc '[inputs]' <<< "$(ls modpacks/ | grep -v '^_' | grep -v 'default.nix')")
          echo "modpacks=$packs" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        modpack: ${{ fromJson(needs.discover.outputs.modpacks) }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: sploosh
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build mrpack
        run: |
          nix profile install nixpkgs#packwiz
          mkdir -p result-mrpack
          cd modpacks/${{ matrix.modpack }}
          packwiz modrinth export -o ../../result-mrpack/${{ matrix.modpack }}.mrpack

      - name: Build packDir
        run: nix build .#${{ matrix.modpack }}-packdir -o result-packdir

      - name: Upload mrpack artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrpack-${{ matrix.modpack }}
          path: result-mrpack/*.mrpack

      - name: Upload packDir artifact
        uses: actions/upload-artifact@v4
        with:
          name: packdir-${{ matrix.modpack }}
          path: result-packdir/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all mrpack artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mrpack-*
          path: mrpacks/
          merge-multiple: true

      - name: Download all packDir artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packdir-*
          path: packdirs/

      - name: Create/update 'latest' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: modpacks-latest
          name: "Modpacks (latest)"
          files: mrpacks/**/*.mrpack
          prerelease: true
          make_latest: false

      - name: Build Pages site
        run: |
          mkdir -p _site
          # Copy each pack's static files under its own directory
          for pack in packdirs/*/; do
            name=$(basename "$pack")
            mkdir -p "_site/$name"
            cp -r "$pack". "_site/$name/"
          done

          # Generate index page
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/modpacks-latest"
          cat > _site/index.html <<HTML
          <!DOCTYPE html><html><head><meta charset="utf-8">
          <title>Sploosh Modpacks</title>
          <style>body{font-family:monospace;max-width:700px;margin:2rem auto;padding:0 1rem}</style>
          </head><body>
          <h1>Sploosh Modpacks</h1>
          HTML
          for pack in packdirs/*/; do
            name=$(basename "$pack")
            echo "<h2>$name</h2>" >> _site/index.html
            echo "<ul>" >> _site/index.html
            echo "<li><a href=\"$RELEASE_URL/${name}.mrpack\">Download .mrpack (Prism/Modrinth)</a></li>" >> _site/index.html
            echo "<li><a href=\"$PAGES_URL/$name/pack.toml\">pack.toml (auto-update URL)</a></li>" >> _site/index.html
            echo "</ul>" >> _site/index.html
          done
          echo "</body></html>" >> _site/index.html

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/
      - uses: actions/deploy-pages@v4
