name: Build modpacks

on:
  push:
    branches: [main]
    paths:
      - "modpacks/**"
      - "flake.nix"
      - "flake.lock"
  workflow_dispatch:

permissions:
  contents: write      # create releases
  pages: write         # deploy Pages
  id-token: write      # OIDC for Pages

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      modpacks: ${{ steps.list.outputs.modpacks }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          packs=$(ls modpacks/ | grep -v '^_' | grep -v '^default.nix' | jq -Rnc '[inputs]' <<< "$(ls modpacks/ | grep -v '^_' | grep -v 'default.nix')")
          echo "modpacks=$packs" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        modpack: ${{ fromJson(needs.discover.outputs.modpacks) }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: sploosh
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build mrpack
        run: |
          nix profile install nixpkgs#packwiz
          mkdir -p result-mrpack
          cd modpacks/${{ matrix.modpack }}
          packwiz modrinth export -o ../../result-mrpack/${{ matrix.modpack }}.mrpack

      - name: Build packDir
        run: nix build .#${{ matrix.modpack }}-packdir -o result-packdir

      - name: Upload mrpack artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrpack-${{ matrix.modpack }}
          path: result-mrpack/*.mrpack

      - name: Upload packDir artifact
        uses: actions/upload-artifact@v4
        with:
          name: packdir-${{ matrix.modpack }}
          path: result-packdir/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all mrpack artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mrpack-*
          path: mrpacks/
          merge-multiple: true

      - name: Download all packDir artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packdir-*
          path: packdirs/

      - name: Create/update 'latest' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: modpacks-latest
          name: "Modpacks (latest)"
          files: mrpacks/**/*.mrpack
          prerelease: true
          make_latest: false

      - name: Build Pages site
        run: |
          mkdir -p _site
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/modpacks-latest"
          for pack in packdirs/*/; do
            name=$(basename "$pack" | sed 's/^packdir-//')
            mkdir -p "_site/$name"
            cp -r "$pack". "_site/$name/"
          done
          cat > _site/index.html <<HTML
          <!DOCTYPE html><html><head><meta charset="utf-8">
          <title>Sploosh Modpacks</title>
          <style>
            body{font-family:monospace;max-width:700px;margin:2rem auto;padding:0 1rem}
            code{background:#f4f4f4;padding:2px 6px;border-radius:3px;word-break:break-all}
            .steps{margin:0;padding-left:1.4rem;line-height:2}
            details{margin:1rem 0;border:1px solid #ddd;border-radius:4px;padding:.5rem 1rem}
            summary{cursor:pointer;font-weight:bold}
          </style>
          </head><body>
          <h1>Sploosh Modpacks</h1>
          <details open><summary>How to join</summary>
          <ol class="steps">
            <li>Download and install <a href="https://prismlauncher.org">Prism Launcher</a></li>
            <li>Click <b>Add Instance</b> → <b>Import</b> and paste the install link for your pack below</li>
            <li>Launch the instance once to let it download mods</li>
            <li>Connect to the server — ask in Discord for the address</li>
          </ol>
          <details><summary>Set up auto-updates (recommended)</summary>
          <ol class="steps">
            <li>Right-click the instance → <b>Edit</b> → <b>Settings</b> → tick <b>Custom commands</b></li>
            <li>Set the <b>Pre-launch command</b> to the auto-update command shown for your pack below</li>
            <li><i>(Optional)</i> Move <code>packwiz-installer-bootstrap.jar</code> from <code>mods/</code> to the <code>.minecraft</code> root to suppress the "not a real mod" warning from NeoForge</li>
          </ol>
          </details>
          </details>
          HTML
          for pack in packdirs/*/; do
            name=$(basename "$pack" | sed 's/^packdir-//')
            display=$(grep '^name' "_site/$name/pack.toml" | cut -d'"' -f2)
            mc=$(grep '^minecraft' "_site/$name/pack.toml" | cut -d'"' -f2)
            cat >> _site/index.html <<HTML
          <h2>$display</h2>
          <p>Minecraft $mc</p>
          <ul class="steps">
            <li><b>Install link:</b> <code>$RELEASE_URL/$name.mrpack</code></li>
            <li><b>Pre-launch command:</b> <code>&quot;\$INST_JAVA&quot; -jar &quot;\$INST_MC_DIR/mods/packwiz-installer-bootstrap.jar&quot; $PAGES_URL/$name/pack.toml</code></li>
          </ul>
          HTML
          done
          echo "</body></html>" >> _site/index.html

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/
      - uses: actions/deploy-pages@v4

      - name: Register pack URLs in D1
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          CF_WORKER_SECRET: ${{ secrets.CF_WORKER_SECRET }}
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/modpacks-latest"
          for pack in packdirs/*/; do
            name=$(basename "$pack" | sed 's/^packdir-//')
            body="{\"mrpack_url\": \"${RELEASE_URL}/${name}.mrpack\", \"pack_toml_url\": \"${PAGES_URL}/${name}/pack.toml\"}"
            hmac=$(echo -n "${name}:${body}" | openssl dgst -sha256 -hmac "${CF_WORKER_SECRET}" | awk '{print $2}')
            curl -sf -X PATCH "${CF_WORKER_URL}/admin/modpacks/${name}" \
              -H "Content-Type: application/json" \
              -H "X-Sploosh-Sig: ${hmac}" \
              -d "${body}"
            echo "  Updated ${name}"
          done
