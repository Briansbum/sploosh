name: Build modpacks

on:
  push:
    branches: [main]
    paths:
      - "modpacks/**"
      - "flake.nix"
      - "flake.lock"
  workflow_dispatch:

permissions:
  contents: write      # create releases

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      modpacks: ${{ steps.list.outputs.modpacks }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          packs=$(ls modpacks/ | grep -v '^_' | grep -v '^default.nix' | jq -Rnc '[inputs]' <<< "$(ls modpacks/ | grep -v '^_' | grep -v 'default.nix')")
          echo "modpacks=$packs" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        modpack: ${{ fromJson(needs.discover.outputs.modpacks) }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: sploosh
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build mrpack
        run: |
          nix profile install nixpkgs#packwiz
          mkdir -p result-mrpack
          cd modpacks/${{ matrix.modpack }}
          packwiz modrinth export -o ../../result-mrpack/${{ matrix.modpack }}.mrpack

      - name: Build packDir
        run: nix build .#${{ matrix.modpack }}-packdir -o result-packdir

      - name: Upload mrpack artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrpack-${{ matrix.modpack }}
          path: result-mrpack/*.mrpack

      - name: Upload packDir artifact
        uses: actions/upload-artifact@v4
        with:
          name: packdir-${{ matrix.modpack }}
          path: result-packdir/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all mrpack artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mrpack-*
          path: mrpacks/
          merge-multiple: true

      - name: Download all packDir artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packdir-*
          path: packdirs/

      - name: Create/update 'latest' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: modpacks-latest
          name: "Modpacks (latest)"
          files: mrpacks/**/*.mrpack
          prerelease: true
          make_latest: false

      - name: Stage packDirs for worker
        run: |
          mkdir -p worker/public/packs
          for pack in packdirs/*/; do
            name=$(basename "$pack")
            mkdir -p "worker/public/packs/$name"
            cp -r "$pack". "worker/public/packs/$name/"
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci
        working-directory: worker

      - name: Deploy worker with pack assets
        run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
